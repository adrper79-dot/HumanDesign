name: Test, Deploy, and Verify Workers

concurrency:
  group: workers-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.js'
      - '.github/workflows/deploy-workers.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'workers/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vitest.config.js'
      - '.github/workflows/deploy-workers.yml'

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    name: Reliability Gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run deterministic tests
        run: npm run test:deterministic

      - name: Run coverage
        run: npm run test:coverage

  deploy:
    needs: gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      - name: Install worker dependencies
        run: npm ci --prefix workers

      - name: Deploy to Cloudflare Workers
        run: npm run deploy --prefix workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify production worker
        run: npm run verify:prod

      - name: Run public canary
        run: npm run verify:canary
        env:
          FRONTEND_BASE: https://selfprime.net
          PROD_API: https://prime-self-api.adrper79.workers.dev
