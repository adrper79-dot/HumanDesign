name: Test & Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'workers/**'
      - 'tests/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install worker dependencies (needed for vitest to resolve worker imports)
        run: npm ci --prefix workers

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: P0 issue gate
        run: |
          P0=$(node scripts/count-issues.js --severity P0 --status open || true)
          echo "Open P0 issues: $P0"
          if [ "${P0:-0}" -gt "0" ]; then
            echo "::error::$P0 open P0 issue(s) in issue-registry.json. Resolve before deploying."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend --project-name=prime-self-ui --branch=main

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production gate
        run: npm run verify:prod:gate -- --strict-browser
        env:
          E2E_TEST_EMAIL: ${{ secrets['E2E_TEST_EMAIL'] }}
          E2E_TEST_PASSWORD: ${{ secrets['E2E_TEST_PASSWORD'] }}
          TEST_BASE_URL: https://selfprime.net
          PROD_API: https://prime-self-api.adrper79.workers.dev

      - name: Upload prod gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-gate-frontend-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
