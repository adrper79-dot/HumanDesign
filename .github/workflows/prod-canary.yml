name: Production Canary

concurrency:
  group: prod-canary-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prod-canary:
    runs-on: ubuntu-latest
    name: Run live production canary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci --prefix workers

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production gate
        run: npm run verify:prod:gate -- --strict-browser
        env:
          AUDIT_SECRET: ${{ secrets.AUDIT_SECRET }}
          E2E_TEST_EMAIL: ${{ secrets['E2E_TEST_EMAIL'] }}
          E2E_TEST_PASSWORD: ${{ secrets['E2E_TEST_PASSWORD'] }}
          TEST_BASE_URL: https://selfprime.net
          PROD_API: https://prime-self-api.adrper79.workers.dev

      - name: Upload prod canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-canary-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14