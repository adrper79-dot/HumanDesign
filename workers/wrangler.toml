name = "prime-self-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# account_id moved to CLOUDFLARE_ACCOUNT_ID environment variable

[vars]
ENVIRONMENT = "production"
COMPANY_ADDRESS = "8 The Green, Suite A, Dover, DE 19901, USA"
# PRA-SEC-002: JWT claims are env-scoped to prevent cross-environment token replay.
# Override these in a staging wrangler.toml with "staging" values.
JWT_ISSUER   = "primeself"
JWT_AUDIENCE = "primeself-api"
# ─── Stripe Price IDs ───────────────────────────────────────────
# HD_UPDATES3 pricing (March 2026). Create new Price objects in Stripe dashboard
# at the new amounts, then update these values and deploy.
#
# Individual tier — $19/mo  (was Explorer $12/mo)
STRIPE_PRICE_INDIVIDUAL = "price_1T9DC4AW1229TZteG7b195zw"
# Individual annual — $190/yr
STRIPE_PRICE_INDIVIDUAL_ANNUAL = "price_1TAdhpAW1229TZtesPw8ybqa"
#
# Practitioner tier — $97/mo  (was Guide $60/mo)
STRIPE_PRICE_PRACTITIONER = "price_1T9DCKAW1229TZtevvfdcPN9"
# Practitioner annual — $970/yr
STRIPE_PRICE_PRACTITIONER_ANNUAL = "price_1TAdhqAW1229TZteTfsr8Gba"
#
# Agency tier — $349/mo  (was Studio $149/mo)
STRIPE_PRICE_AGENCY = "price_1T9DCRAW1229TZteIIPY6CXF"
# Agency annual — $3,490/yr
STRIPE_PRICE_AGENCY_ANNUAL = "price_1TAdhqAW1229TZtevt3cZJV2"
# ─── Trial Period ────────────────────────────────────────────────────────────
# GTM decision (2026-03-21): 14-day free trial for Practitioner tier.
# Set to "0" or remove to disable free trials.
STRIPE_TRIAL_DAYS = "14"
#
# One-time add-on products
STRIPE_PRICE_SINGLE_SYNTHESIS = "price_1TAdiJAW1229TZteivqs350O"
STRIPE_PRICE_COMPOSITE_READING = "price_1TAdiKAW1229TZte9GzTx7VX"
STRIPE_PRICE_TRANSIT_PASS = "price_1TAdiKAW1229TZteU0aiPEo1"
STRIPE_PRICE_LIFETIME_INDIVIDUAL = "price_1TAdiLAW1229TZte5Fteep0Y"
#
# Legacy aliases (still referenced by getTierConfig fallback)
STRIPE_PRICE_REGULAR = "price_1T9DC4AW1229TZteG7b195zw"
STRIPE_PRICE_WHITE_LABEL = "price_1T9DCRAW1229TZteIIPY6CXF"

# ─── Secrets (set via: npx wrangler secret put <NAME>) ────────────────────────
# The following vars are NOT stored here — add them as encrypted Worker secrets:
#
# ═══ OBSERVABILITY ═══════════════════════════════════════════════════════════
#   SENTRY_DSN              - Sentry error tracking DSN (sentry.io project)
#   SENTRY_RELEASE          - Optional release tag for Sentry error grouping
#   CF_API_TOKEN            - Cloudflare API token for observability/analytics [WC-005]
#   CF_ACCOUNT_ID           - Cloudflare account ID for observability metrics [WC-005]
#
# ═══ AUTHENTICATION & OAUTH  ════════════════════════════════════════════════
#   GOOGLE_CLIENT_ID        - Google OAuth client ID (from Google Console) [WC-006]
#   GOOGLE_CLIENT_SECRET    - Google OAuth client secret (from Google Console) [WC-006]
#   APPLE_CLIENT_ID         - Apple Sign-In service ID (from Apple Developer) [WC-007]
#   APPLE_TEAM_ID           - Apple Developer Team ID (from Apple Developer) [WC-007]
#   APPLE_KEY_ID            - Apple Auth Key ID (from Apple Developer) [WC-007]
#   APPLE_PRIVATE_KEY       - Apple Auth Key private key (.p8 file content) [WC-007]
#                             See: frontend/../AuthKey_V47LW986LS.p8
#
# ═══ THIRD-PARTY INTEGRATIONS ═══════════════════════════════════════════════
#   NEON_CONNECTION_STRING  - PostgreSQL connection string (Neon) [DB]
#   ANTHROPIC_API_KEY       - Anthropic API key for Claude AI [AI]
#   GROK_API_KEY            - Grok AI API key (optional fallback) [AI]
#   GROQ_API_KEY            - Groq AI API key (optional fallback) [AI]
#
# ═══ MESSAGING & SMS ════════════════════════════════════════════════════════
#   TELNYX_API_KEY          - Telnyx API key for SMS delivery [WC-008]
#   TELNYX_PHONE_NUMBER     - Your Telnyx phone number for SMS from/to [WC-008]
#   TELNYX_PUBLIC_KEY       - Telnyx Ed25519 public key (webhook signature) [WC-008]
#   TELNYX_CONNECTION_ID    - Telnyx connection ID for outbound SMS routing [WC-008]
#   RESEND_API_KEY          - Resend email API key (alternative to TELNYX)
#   VAPID_PUBLIC_KEY        - VAPID public key for Web Push notifications
#   VAPID_PRIVATE_KEY       - VAPID private key for Web Push notifications
#   VAPID_SUBJECT           - VAPID subject (URL for Web Push)
#
# ═══ STRIPE PAYMENTS ════════════════════════════════════════════════════════
#   STRIPE_SECRET_KEY       - Stripe API secret key (production account)
#   STRIPE_WEBHOOK_SECRET   - Stripe webhook signing secret
#
# ═══ APPLICATION STATE ══════════════════════════════════════════════════════
#   JWT_SECRET              - JWT signing key (generate with: openssl rand -base64 32)
#   ADMIN_TOKEN             - Admin API token for elevated endpoints
#   BASE_URL                - Backend API origin (e.g., https://prime-self-api.adrper79.workers.dev)
#   FRONTEND_URL            - Frontend origin (e.g., https://selfprime.net)
#   FROM_EMAIL              - Sender email address for transactional emails
#   AI_GATEWAY_URL          - Cloudflare AI Gateway endpoint (if using)
#
# Full setup guide: guides/ENVIRONMENT_VARIABLES.md
#
# Quick setup command template:
#   npx wrangler secret put SENTRY_DSN
#   npx wrangler secret put CF_API_TOKEN
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   ... etc for each secret

# KV namespace for rate limiting + chart cache
# Create with: wrangler kv namespace create CACHE
# Then paste the generated id below
[[kv_namespaces]]
binding = "CACHE"
id = "a4869245e0ac49c0af1d0c5a9d6266d2"

# KV namespace for daily ceiling counters (auto-expires via TTL)
# Create with: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the generated id below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "926659f6f1b34d83b7d8edc7515939c0"

# R2 bucket for PDF exports and knowledgebase corpus
[[r2_buckets]]
binding = "R2"
bucket_name = "prime-self-exports"

# Cron Triggers — daily transit snapshot + digest at 6 AM UTC
[triggers]
crons = ["0 6 * * *"]

# Secrets (set via wrangler secret put):
# NEON_CONNECTION_STRING
# ANTHROPIC_API_KEY
# GROK_API_KEY
# GROQ_API_KEY
# TELNYX_API_KEY
# TELNYX_PHONE_NUMBER
# TELNYX_PUBLIC_KEY    - Ed25519 public key for Telnyx webhook signature verification
# TELNYX_CONNECTION_ID - Telnyx connection ID for outbound SMS
# JWT_SECRET
# AI_GATEWAY_URL
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# BASE_URL
# FRONTEND_URL
# FROM_EMAIL
# NOTION_CLIENT_ID
# NOTION_CLIENT_SECRET
# NOTION_TOKEN_ENCRYPTION_KEY
# VAPID_PRIVATE_KEY
# VAPID_PUBLIC_KEY
# VAPID_SUBJECT
# ADMIN_TOKEN          (used by POST /api/admin/promo — set via: wrangler secret put ADMIN_TOKEN)
# REVENUECAT_WEBHOOK_SECRET (RevenueCat webhook auth token — set in RevenueCat Dashboard → Project → Integrations → Webhooks, then: wrangler secret put REVENUECAT_WEBHOOK_SECRET)
# PRIME_SELF_API_SECRET (used by the discord/ Worker to auth internal API calls — set on both workers)
# GOOGLE_CLIENT_ID     (OAuth — wrangler secret put GOOGLE_CLIENT_ID)
# GOOGLE_CLIENT_SECRET (OAuth — wrangler secret put GOOGLE_CLIENT_SECRET)
# APPLE_CLIENT_ID      (OAuth — wrangler secret put APPLE_CLIENT_ID)
# APPLE_TEAM_ID        (OAuth — wrangler secret put APPLE_TEAM_ID)
# APPLE_KEY_ID         (OAuth — wrangler secret put APPLE_KEY_ID)
# APPLE_PRIVATE_KEY    (OAuth — wrangler secret put APPLE_PRIVATE_KEY)

# ─── Durable Objects — Live Session WebSocket fan-out (GAP-008) ─────────────
# One DO instance per live session (identified by sessionId UUID).
# Deploy registers the new class via the migration below.
[[durable_objects.bindings]]
name = "LIVE_SESSION"
class_name = "LiveSession"

# Durable Objects migration — registers LiveSession class with the Workers runtime
[[migrations]]
tag = "v1-live-session"
new_classes = ["LiveSession"]

# ─── Staging Environment (CTO-013/CIO-008) ───────────────────────────────────
# Deploy to staging with: wrangler deploy --env staging
# Staging secrets are independent — set them via: wrangler secret put <NAME> --env staging
# Promotion workflow:
#   1. wrangler deploy --env staging   (deploys prime-self-api-staging)
#   2. Run smoke tests against staging API
#   3. wrangler deploy                 (promotes to production)
[env.staging]
name = "prime-self-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
COMPANY_ADDRESS = "8 The Green, Suite A, Dover, DE 19901, USA"
# JWT claims are scoped to staging to prevent token replay into production
JWT_ISSUER   = "primeself-staging"
JWT_AUDIENCE = "primeself-api-staging"
# Use Stripe test-mode price IDs for staging
# (set these to your Stripe test-mode price IDs)
STRIPE_PRICE_INDIVIDUAL          = "price_test_individual"
STRIPE_PRICE_INDIVIDUAL_ANNUAL   = "price_test_individual_annual"
STRIPE_PRICE_PRACTITIONER        = "price_test_practitioner"
STRIPE_PRICE_PRACTITIONER_ANNUAL = "price_test_practitioner_annual"
STRIPE_PRICE_AGENCY              = "price_test_agency"
STRIPE_PRICE_AGENCY_ANNUAL       = "price_test_agency_annual"
STRIPE_PRICE_SINGLE_SYNTHESIS    = "price_test_single_synthesis"
STRIPE_PRICE_COMPOSITE_READING   = "price_test_composite_reading"
STRIPE_PRICE_TRANSIT_PASS        = "price_test_transit_pass"
STRIPE_PRICE_LIFETIME_INDIVIDUAL = "price_test_lifetime_individual"

# Staging uses its own KV namespaces — create them before deploying to staging:
#
#   cd workers
#   wrangler kv namespace create CACHE --env staging
#   # Copy the "id" from the output and paste it as the CACHE id below
#
#   wrangler kv namespace create RATE_LIMIT_KV --env staging
#   # Copy the "id" from the output and paste it as the RATE_LIMIT_KV id below
#
# Then commit the updated wrangler.toml with the real IDs.

[[env.staging.kv_namespaces]]
binding = "CACHE"
# TODO (SYS-040): Replace with real staging namespace ID.
# Run: cd workers && wrangler kv namespace create CACHE --env staging
id = "REPLACE_WITH_STAGING_CACHE_KV_ID"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
# TODO (SYS-040): Replace with real staging namespace ID.
# Run: cd workers && wrangler kv namespace create RATE_LIMIT_KV --env staging
id = "REPLACE_WITH_STAGING_RATE_LIMIT_KV_ID"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "prime-self-exports-staging"
