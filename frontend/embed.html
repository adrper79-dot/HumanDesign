<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Self — Chart Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg2: #0d0d1a;
      --text: #e8e8ec;
      --text-dim: #a0a0b0;
      --accent: #c9a84c;
      --accent-hover: #dbb85c;
      --border: #1f1f2e;
      --error: #ff6b6b;
      --success: #51cf66;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
    }

    .widget-container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg2);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    h2 {
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 24px;
    }

    .subtitle {
      color: var(--text-dim);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-weight: 500;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
    }

    input::placeholder {
      color: var(--text-dim);
    }

    .time-location-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .results {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .result-item {
      margin-bottom: 16px;
    }

    .result-label {
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .result-value {
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
    }

    .result-value.type {
      color: var(--accent);
      font-size: 24px;
    }

    .gates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .gate-badge {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
      font-weight: 600;
      color: var(--accent);
      font-size: 14px;
    }

    .error-message {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
    }

    .attribution {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }

    .attribution a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .attribution a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .widget-container {
        padding: 16px;
      }

      h2 {
        font-size: 20px;
      }

      .time-location-grid {
        grid-template-columns: 1fr;
      }

      .gates-grid {
        grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      }
    }

    /* Theme overrides via URL params */
    body.theme-light {
      --bg: #ffffff;
      --bg2: #f8f9fa;
      --text: #212529;
      --text-dim: #6c757d;
      --border: #dee2e6;
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <h2>Discover Your Energy Blueprint</h2>
    <p class="subtitle">Enter your birth details to reveal your Human Design chart</p>

    <form id="calculatorForm">
      <div class="form-group">
        <label for="birthdate">Birth Date</label>
        <input type="date" id="birthdate" name="birthdate" required>
      </div>

      <div class="form-group">
        <label for="birthtime">Birth Time (optional, but recommended)</label>
        <input type="time" id="birthtime" name="birthtime" placeholder="HH:MM">
      </div>

      <div class="form-group">
        <label for="location">Birth Location</label>
        <input type="text" id="location" name="location" placeholder="City, Country" required>
      </div>

      <button type="submit" id="calculateBtn">Calculate My Chart</button>
    </form>

    <div id="loadingState" class="loading hidden">
      <div class="spinner"></div>
      <p style="margin-top: 16px;">Calculating your chart...</p>
    </div>

    <div id="errorState" class="error-message hidden"></div>

    <div id="resultsState" class="results hidden">
      <div class="result-item">
        <div class="result-label">Your Type</div>
        <div class="result-value type" id="resultType">—</div>
      </div>

      <div class="result-item">
        <div class="result-label">Strategy</div>
        <div class="result-value" id="resultStrategy">—</div>
      </div>

      <div class="result-item">
        <div class="result-label">Authority</div>
        <div class="result-value" id="resultAuthority">—</div>
      </div>

      <div class="result-item">
        <div class="result-label">Profile</div>
        <div class="result-value" id="resultProfile">—</div>
      </div>

      <div class="result-item">
        <div class="result-label">Defined Gates</div>
        <div class="gates-grid" id="resultGates"></div>
      </div>

      <button id="viewFullBtn" onclick="openFullChart()" style="margin-top: 20px;">
        View Full Chart & Profile
      </button>
    </div>

    <div class="attribution" id="attribution">
      Powered by <a href="https://primeself.app" target="_blank">Prime Self</a>
    </div>
  </div>

  <script>
    // BL-R-M19: Derive parent origin for secure postMessage targeting
    // SECURITY: Never use '*' — if origin cannot be determined, skip postMessage entirely
    const parentOrigin = (function() {
      try {
        if (document.referrer) {
          return new URL(document.referrer).origin;
        }
        console.warn('[Prime Self Embed] No referrer — postMessage to parent disabled for security');
        return null;
      } catch (e) {
        console.warn('[Prime Self Embed] Invalid referrer URL — postMessage to parent disabled');
        return null;
      }
    })();

    // Safe postMessage wrapper — only sends if parentOrigin is valid
    function safePostMessage(message) {
      if (parentOrigin && window.parent !== window) {
        window.parent.postMessage(message, parentOrigin);
      }
    }

    // Parse URL parameters for customization
    const urlParams = new URLSearchParams(window.location.search);
    const theme = urlParams.get('theme');
    const accent = urlParams.get('accent');
    const hideAttributionRequested = urlParams.get('hideAttribution') === 'true';
    const apiKey = urlParams.get('apiKey') || '';
    const apiEndpoint = urlParams.get('apiEndpoint') || 'https://prime-self-api.adrper79.workers.dev';

    // Apply theme
    if (theme === 'light') {
      document.body.classList.add('theme-light');
    }

    // Apply custom accent color (sanitize: hex only)
    if (accent && /^#[0-9A-F]{6}$/i.test(accent)) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-hover', accent + 'dd');
    }

    // ── Attribution enforcement (security: server-validated) ──────────
    // hideAttribution=true is ONLY honored when:
    //   1. An apiKey is provided in the URL
    //   2. The server confirms the key belongs to a white_label tier subscriber
    // Failing either check: attribution remains visible (fail-safe default).
    async function validateAttributionPermission(key) {
      if (!key) return false;
      try {
        const res = await fetch(`${apiEndpoint}/api/embed/validate?apiKey=${encodeURIComponent(key)}`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) return false;
        const data = await res.json();
        return data.valid === true && data.features?.hideAttribution === true;
      } catch {
        return false; // network error → show attribution
      }
    }

    if (hideAttributionRequested && apiKey) {
      // Async validation — attribution shows until permission confirmed
      validateAttributionPermission(apiKey).then(allowed => {
        if (allowed) {
          document.getElementById('attribution').classList.add('hidden');
        }
        // If not allowed: attribution stays visible — no client-side override possible
      });
    }

    // Form submission
    document.getElementById('calculatorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const birthdate = document.getElementById('birthdate').value;
      const birthtime = document.getElementById('birthtime').value || '12:00';
      const location = document.getElementById('location').value;

      if (!birthdate || !location) {
        showError('Please fill in all required fields');
        return;
      }

      // Show loading state
      document.getElementById('calculatorForm').classList.add('hidden');
      document.getElementById('resultsState').classList.add('hidden');
      document.getElementById('errorState').classList.add('hidden');
      document.getElementById('loadingState').classList.remove('hidden');

      try {
        // Call API to calculate chart
        const response = await fetch(`${apiEndpoint}/calculate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            birthdate: birthdate,
            birthtime: birthtime,
            location: location,
          }),
        });

        if (!response.ok) {
          throw new Error('Failed to calculate chart');
        }

        const data = await response.json();
        
        // Store chart data for "View Full Chart" button
        window.chartData = data;

        // Display results
        displayResults(data);

        // Notify parent window about chart calculation
        safePostMessage({
          type: 'primeself-chart-calculated',
          data: data,
        });

        // Notify parent window about resize (for iframe auto-sizing)
        notifyResize();

      } catch (error) {
        console.error('Chart calculation error:', error);
        
        // Notify parent window about error
        safePostMessage({
          type: 'primeself-error',
          error: error.message,
        });
        
        showError('Unable to calculate chart. Please try again or check your internet connection.');
      }
    });

    function displayResults(data) {
      document.getElementById('resultType').textContent = data.type || 'Unknown';
      document.getElementById('resultStrategy').textContent = data.strategy || 'Unknown';
      document.getElementById('resultAuthority').textContent = data.authority || 'Unknown';
      document.getElementById('resultProfile').textContent = data.profile || 'Unknown';

      // Display gates
      const gatesContainer = document.getElementById('resultGates');
      gatesContainer.innerHTML = '';
      
      if (data.gates && data.gates.length > 0) {
        data.gates.forEach(gate => {
          const badge = document.createElement('div');
          badge.className = 'gate-badge';
          badge.textContent = gate;
          gatesContainer.appendChild(badge);
        });
      } else {
        gatesContainer.innerHTML = '<p style="color: var(--text-dim); font-size: 14px;">No defined gates</p>';
      }

      // Show results
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('resultsState').classList.remove('hidden');

      // Notify resize
      notifyResize();
    }

    function showError(message) {
      document.getElementById('errorState').textContent = message;
      document.getElementById('errorState').classList.remove('hidden');
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('calculatorForm').classList.remove('hidden');
      notifyResize();
    }

    function openFullChart() {
      const birthdate = document.getElementById('birthdate').value;
      const birthtime = document.getElementById('birthtime').value;
      const location = document.getElementById('location').value;
      
      // Build URL with pre-filled data
      const params = new URLSearchParams({
        birthdate,
        birthtime,
        location,
        source: 'embed',
      });
      
      const fullChartUrl = `https://primeself.app/?${params.toString()}`;
      
      // Open in new tab or notify parent window
      if (window.parent !== window && parentOrigin) {
        // Inside iframe with valid origin - notify parent
        safePostMessage({
          type: 'primeself-open-chart',
          url: fullChartUrl,
        });
      } else {
        // Standalone - open directly
        window.open(fullChartUrl, '_blank');
      }
    }

    function notifyResize() {
      // Send height to parent for iframe auto-sizing
      const height = document.body.scrollHeight;
      safePostMessage({
        type: 'primeself-resize',
        height: height,
      });
    }

    // Notify initial size
    window.addEventListener('load', () => {
      notifyResize();
    });

    // Re-notify on window resize
    window.addEventListener('resize', () => {
      notifyResize();
    });
  </script>
</body>
</html>
