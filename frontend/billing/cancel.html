<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Cancelled — Prime Self</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e6f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #0f1522;
    border: 1px solid #1e2a45;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.10);
    border: 2px solid #c9a84c;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }
  h1 { font-size: 24px; font-weight: 700; color: #e8e6f0; margin-bottom: 12px; }
  .sub { font-size: 15px; color: #918db0; line-height: 1.6; margin-bottom: 8px; }
  .safe { color: #50c878; font-size: 14px; margin-bottom: 28px; }
  .btn-primary {
    display: inline-block;
    background: linear-gradient(135deg, #c9a84c 0%, #6a4fc8 100%);
    color: #fff;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost {
    display: block;
    color: #918db0;
    text-decoration: none;
    font-size: 14px;
    margin-top: 16px;
  }
  .btn-ghost:hover { color: #e8e6f0; }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">☁</div>
  <h1>No worries.</h1>
  <p class="sub">You cancelled the checkout — nothing was charged to your card.</p>
  <p class="safe">✓ No payment taken · ✓ Your account is unchanged</p>
  <a href="/" class="btn-primary">Back to Prime Self</a>
  <a href="/" class="btn-ghost">View free features →</a>
</div>
</body>
</html>
