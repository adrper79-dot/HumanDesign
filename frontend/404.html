<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Prime Self</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e8e4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .code { font-size: 96px; font-weight: 700; color: #c9a84c; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 12px; color: #e8e4f0; }
    p { color: #918db0; line-height: 1.6; margin-bottom: 32px; }
    a.btn {
      display: inline-block;
      background: linear-gradient(135deg, #c9a84c 0%, #6a4fc8 100%);
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: opacity 0.2s;
    }
    a.btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back to discovering your unique blueprint.</p>
    <a href="/" class="btn">Back to Prime Self</a>
  </div>
</body>
</html>
